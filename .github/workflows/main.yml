name: Build OQB-updater

on: 
  push:
  workflow_dispatch:

jobs:
  OQB-updater:
    runs-on: ubuntu-latest
    #container: hamletdufromage/devkita64_devkitarm
    container: devkitpro/devkita64
    steps:
    - uses: actions/checkout@v1

    - name: update repo
      run: |
        git config --global --add safe.directory /__w/OQB-updater/OQB-updater/lib/borealis
        git config --global --add safe.directory /__w/OQB-updater/OQB-updater
        git config --global --add safe.directory /__w/OQB-updater/OQB-updater/TegraExplorer
        git submodule update --init --recursive

    - name: install dependencies
      run: |
        sudo apt update -y
        sudo apt install build-essential -y

    - name: Building OQB-updater
      run: |
        make -C aiosu-forwarder -f Makefile
        make -j$(nproc)
        
    - uses: actions/upload-artifact@master
      with:
        name: OQB-updater
        path: OQB-updater.nro
